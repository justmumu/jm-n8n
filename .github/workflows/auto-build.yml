name: Auto Build Custom n8n with Other Tools

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 03:00 UTC
  workflow_dispatch: # Manual trigger
    inputs:
      dry_run:
        description: "Cleanup dry-run (log only, no delete)"
        type: boolean
        default: true
      skip_build:
        description: "Skip build/manifest, run cleanup only"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Check for new n8n version
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.n8n_version.outputs.version }}
      alpine_version: ${{ steps.alpine_version.outputs.version }}
      should_build: ${{ steps.check_image.outputs.should_build }}
    
    steps:
      - name: Get latest n8n version
        id: n8n_version
        run: |
          # Get the digest of the 'latest' tag
          LATEST_DIGEST=$(curl -s "https://hub.docker.com/v2/repositories/n8nio/n8n/tags/latest" | jq -r '.images[0].digest')
          echo "Latest tag digest: $LATEST_DIGEST"
          
          # Find the version tag with the same digest
          VERSION=$(curl -s "https://hub.docker.com/v2/repositories/n8nio/n8n/tags?page_size=100" \
            | jq -r --arg digest "$LATEST_DIGEST" \
            '.results[] | select(.images[0].digest == $digest) | .name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1)
          echo "Detected latest n8n version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Alpine version from n8n image
        id: alpine_version
        run: |
          ALPINE_VER=$(docker run --rm --entrypoint sh n8nio/n8n:${{ steps.n8n_version.outputs.version }} -c "grep VERSION_ID /etc/os-release | cut -d= -f2")
          echo "Detected Alpine version: $ALPINE_VER"
          echo "version=$ALPINE_VER" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check_image
        run: |
          if [ "${{ inputs.skip_build }}" = "true" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "skip_build requested, forcing should_build=false"
          elif docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.n8n_version.outputs.version }} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Image already exists, skipping build."
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "New version detected, will build."
          fi

  # Job 2: Build images in parallel (matrix strategy with native runners)
  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform suffix
        id: platform
        run: |
          PLATFORM="${{ matrix.platform }}"
          SUFFIX="${PLATFORM#linux/}"
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-${{ steps.platform.outputs.suffix }}
          build-args: |
            N8N_VERSION=${{ needs.check-version.outputs.version }}
            ALPINE_VERSION=${{ needs.check-version.outputs.alpine_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.platform.outputs.suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.platform.outputs.suffix }},mode=max

  # Job 3: Create multi-platform manifest
  create-manifest:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest for version tag
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}

      - name: Create and push manifest for latest tag
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Cleanup platform-specific tags (optional)
        continue-on-error: true
        run: |
          echo "Platform-specific images kept for cache purposes"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-amd64"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-version.outputs.version }}-arm64"

  # Job 4: Cleanup old GHCR versions (keep last 15)
  cleanup-old-versions:
    needs: [check-version, create-manifest]
    if: always() && (needs.create-manifest.result == 'success' || needs.create-manifest.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      PKG: ${{ github.event.repository.name }}
      KEEP_N: "15"
      EXCLUDE_TAGS: "latest,cache-amd64,cache-arm64"
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Delete old GHCR versions
        run: |
          set -euo pipefail

          OWNER_TYPE=$(gh api "/users/$OWNER" --jq '.type' | tr '[:upper:]' '[:lower:]')
          if [ "$OWNER_TYPE" = "organization" ]; then
            BASE="/orgs/$OWNER/packages/container/$PKG/versions"
          else
            BASE="/users/$OWNER/packages/container/$PKG/versions"
          fi
          echo "Endpoint: $BASE"
          echo "DRY_RUN=$DRY_RUN"

          gh api --paginate "$BASE" --jq '.[]' | jq -s . > versions.json
          echo "Total versions: $(jq length versions.json)"

          IFS=',' read -ra EXC <<< "$EXCLUDE_TAGS"
          EXC_JSON=$(printf '%s\n' "${EXC[@]}" | jq -R . | jq -s .)

          jq --argjson excl "$EXC_JSON" --argjson keepN "$KEEP_N" '
            map(. + {tags: (.metadata.container.tags // [])})
            | (map(select(.tags | length == 0))) as $untagged
            | (map(select(.tags | length > 0))) as $tagged
            | ($tagged | map(select([.tags[] | IN($excl[])] | any))) as $protected
            | ($tagged | map(select([.tags[] | IN($excl[])] | any | not))
                | sort_by(.updated_at) | reverse) as $cands
            | ($cands[:$keepN]) as $kept
            | ($cands[$keepN:]) as $del_t
            | {
                protected_count: ($protected | length),
                kept_count: ($kept | length),
                del_tagged: ($del_t | map({id, tags, updated_at})),
                del_untagged: ($untagged | map({id, updated_at}))
              }
          ' versions.json > plan.json

          echo "Plan summary:"
          jq '{protected: .protected_count, kept: .kept_count,
               del_tagged: (.del_tagged|length),
               del_untagged: (.del_untagged|length)}' plan.json

          echo "Tagged to delete:"
          jq -r '.del_tagged[] | "  id=\(.id) updated=\(.updated_at) tags=\(.tags|join(","))"' plan.json
          echo "Untagged to delete:"
          jq -r '.del_untagged[] | "  id=\(.id) updated=\(.updated_at)"' plan.json

          delete_or_log() {
            local id="$1" label="$2"
            if [ "$DRY_RUN" = "true" ]; then
              echo "  [dry-run] would DELETE $label id=$id"
            else
              if gh api -X DELETE "$BASE/$id"; then
                echo "  deleted $label id=$id"
              else
                echo "  failed $label id=$id"
              fi
            fi
          }

          jq -r '.del_tagged[] | "\(.id) \(.tags|join(","))"' plan.json \
            | while read -r id tags; do delete_or_log "$id" "tagged[$tags]"; done

          jq -r '.del_untagged[].id' plan.json \
            | while read -r id; do delete_or_log "$id" "untagged"; done

          echo "Cleanup done."
